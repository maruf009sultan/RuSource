<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка · 500 - RuSource</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'Fallback';
      src: local('Inter'), local('Segoe UI'), local('Helvetica Neue'), local('Arial');
    }

    body {
      background-color: #1a1620;
      color: #faf3e0;
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .error-code {
      font-family: 'Unbounded', 'Inter', 'Segoe UI', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #dc2626;
      margin-bottom: 1rem;
    }

    .error-code::before {
      content: '';
      display: inline-block;
      width: 2rem;
      height: 2px;
      background-color: #dc2626;
      vertical-align: middle;
      margin-right: 0.75rem;
    }

    .error-code::after {
      content: '';
      display: inline-block;
      width: 2rem;
      height: 2px;
      background-color: #dc2626;
      vertical-align: middle;
      margin-left: 0.75rem;
    }

    h1 {
      font-family: 'Unbounded', 'Inter', 'Segoe UI', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
      color: #faf3e0;
    }

    .description {
      font-size: clamp(0.95rem, 2vw, 1.125rem);
      color: rgba(250, 243, 224, 0.6);
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Unbounded', 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #1a1620;
      background-color: #dc2626;
      padding: 0.85rem 2rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease;
      box-shadow: 4px 4px 0 0 rgba(250, 243, 224, 0.15);
    }

    .home-link:hover {
      transform: translateY(-2px);
      box-shadow: 6px 6px 0 0 rgba(250, 243, 224, 0.2);
    }

    .home-link:active {
      transform: translateY(0);
      box-shadow: 2px 2px 0 0 rgba(250, 243, 224, 0.15);
    }

    .home-link svg {
      width: 1rem;
      height: 1rem;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(to right, rgba(250, 243, 224, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(250, 243, 224, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .glow {
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 40rem;
      height: 40rem;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
    }

    @media (max-width: 640px) {
      .error-code::before,
      .error-code::after {
        width: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <main>
    <p class="error-code">Ошибка · 500</p>
    <h1>Server error</h1>
    <p class="description">Something went wrong on our end. Try refreshing the page.</p>
    <a href="/" class="home-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Back to Home
    </a>
  </main>
</body>
</html>
